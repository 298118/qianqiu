<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>千秋</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="start-panel" aria-labelledby="title">
        <div>
          <p class="eyebrow">Qianqiu</p>
          <h1 id="title">千秋</h1>
          <p class="subtitle">一局从寒窗开始的历史文字模拟。</p>
        </div>

        <form id="start-form" class="start-form">
          <label>
            朝代
            <input name="dynasty" value="明" autocomplete="off">
          </label>
          <label>
            年份
            <input name="year" type="number" value="1644">
          </label>
          <label>
            身份
            <select name="role">
              <option value="scholar">书生</option>
              <option value="emperor">皇帝</option>
              <option value="minister">大臣</option>
              <option value="general">将领</option>
              <option value="magistrate">地方官</option>
              <option value="official">入仕官员</option>
            </select>
          </label>
          <label>
            姓名
            <input name="playerName" value="沈砚" autocomplete="off">
          </label>
          <label class="full-span">
            家境
            <input name="background" value="寒门子弟，父以教书糊口。" autocomplete="off">
          </label>
          <label class="full-span">
            自定义背景
            <textarea name="customSetting" rows="3">县中连年歉收，士子多借书传抄。</textarea>
          </label>
          <button type="submit">开局</button>
        </form>

        <section class="save-panel" id="save-list-panel" aria-labelledby="save-panel-title">
          <header>
            <strong id="save-panel-title">存档簿</strong>
            <button id="save-refresh" type="button">刷新</button>
          </header>
          <p class="save-status" id="save-status">正在查阅存档...</p>
          <div class="save-list" id="save-list"></div>
        </section>

        <section class="ai-panel" id="ai-connection-panel" aria-labelledby="ai-panel-title">
          <header>
            <strong id="ai-panel-title">AI 连接</strong>
            <button id="ai-test-button" type="button">校验</button>
          </header>
          <p class="ai-status" id="ai-test-status">尚未校验。</p>
          <div class="ai-result" id="ai-test-result"></div>
        </section>
      </section>

      <section class="game-panel" aria-live="polite">
        <div class="status-strip" id="status-strip">
          <span>尚未开局</span>
        </div>
        <aside class="scholar-panel" id="scholar-panel" hidden></aside>
        <article class="narrative" id="narrative">
          <p class="placeholder">填写开局设定，进入千秋第一卷。</p>
        </article>
        <div class="action-area" id="action-area" style="display:none;">
          <textarea id="action-input" rows="3" placeholder="输入你的行动，例如：研读《论语》三日"></textarea>
          <button id="action-btn" type="button">行动</button>
        </div>
      </section>

      <div class="exam-backdrop" id="exam-backdrop" hidden>
        <section class="exam-modal" role="dialog" aria-modal="true" aria-labelledby="exam-title">
          <header class="exam-header">
            <span id="exam-meta">科举</span>
            <button id="exam-close" type="button" aria-label="关闭考场">×</button>
          </header>
          <h2 id="exam-title">考试题目</h2>
          <p id="exam-question"></p>
          <ul id="exam-requirements" class="exam-requirements"></ul>
          <div id="exam-writing-tools" class="exam-writing-tools" hidden>
            <span id="exam-word-count">0字</span>
            <span id="exam-word-guide"></span>
          </div>
          <textarea id="exam-essay" rows="11" placeholder="在此落笔成文"></textarea>
          <section id="exam-result" class="exam-result" hidden></section>
          <div class="exam-actions">
            <button id="exam-submit" type="button" disabled>交卷</button>
          </div>
        </section>
      </div>

      <div class="save-backdrop" id="save-backdrop" hidden>
        <section class="save-modal" id="save-list-modal" role="dialog" aria-modal="true" aria-labelledby="save-modal-title">
          <header>
            <span id="save-modal-title">存档簿</span>
            <button id="save-close" type="button" aria-label="关闭存档簿">×</button>
          </header>
          <p class="save-status" id="save-modal-status">正在查阅存档...</p>
          <div class="save-list save-list--modal" id="save-modal-list"></div>
        </section>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
